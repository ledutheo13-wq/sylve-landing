<!DOCTYPE html>
<html lang="fr">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Tableau de bord — SYLVE</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=DM+Sans:ital,wght@0,300;0,400;0,500;1,300&family=Instrument+Serif:ital@0;1&display=swap" rel="stylesheet">
  <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
  <style>
    :root {
      --sylve:       #5E8B8F;
      --sylve-dark:  #3d6366;
      --sylve-light: #E8F0F1;
      --bg:          #F7F6F4;
      --surface:     #FFFFFF;
      --border:      #E2DED9;
      --text:        #2A2826;
      --text-muted:  #7A7672;
      --text-light:  #A09C98;
      --radius:      8px;
    }

    * { box-sizing: border-box; margin: 0; padding: 0; }

    body {
      font-family: 'DM Sans', sans-serif;
      font-weight: 300;
      background: var(--bg);
      color: var(--text);
      min-height: 100vh;
      display: flex;
      flex-direction: column;
    }

    /* ── HEADER ── */
    header {
      padding: 1.4rem 2rem;
      display: flex;
      align-items: center;
      justify-content: space-between;
    }

    .logo {
      font-family: 'DM Sans', sans-serif;
      font-weight: 300;
      font-size: 1.15rem;
      letter-spacing: 0.18em;
      color: var(--sylve);
      text-decoration: none;
    }

    .header-right {
      display: flex;
      align-items: center;
      gap: 1rem;
    }

    .user-name {
      font-size: 0.8rem;
      color: var(--text-muted);
    }

    .btn-logout {
      font-family: 'DM Sans', sans-serif;
      font-size: 0.72rem;
      color: var(--text-light);
      background: none;
      border: 1px solid var(--border);
      border-radius: var(--radius);
      padding: 6px 12px;
      cursor: pointer;
      transition: all 0.15s;
    }

    .btn-logout:hover {
      color: var(--text);
      border-color: var(--text-muted);
    }

    /* ── MAIN ── */
    main {
      flex: 1;
      display: flex;
      align-items: center;
      justify-content: center;
      padding: 2rem;
    }

    .dashboard-container {
      width: 100%;
      max-width: 820px;
    }

    .dashboard-eyebrow {
      font-size: 0.68rem;
      letter-spacing: 0.14em;
      text-transform: uppercase;
      color: var(--text-light);
      font-weight: 500;
      margin-bottom: 0.6rem;
    }

    .dashboard-title {
      font-family: 'Instrument Serif', serif;
      font-size: 1.8rem;
      font-weight: 400;
      color: var(--text);
      line-height: 1.25;
      margin-bottom: 2rem;
    }

    /* ── GRILLE OUTILS ── */
    .tools-grid {
      display: grid;
      grid-template-columns: repeat(3, 1fr);
      gap: 1rem;
    }

    .tool-card {
      background: var(--surface);
      border: 1px solid var(--border);
      border-radius: 12px;
      padding: 2rem 1.5rem;
      text-decoration: none;
      color: var(--text);
      display: flex;
      flex-direction: column;
      align-items: flex-start;
      gap: 1rem;
      transition: border-color 0.2s, box-shadow 0.2s, transform 0.2s;
      position: relative;
      min-height: 200px;
    }

    .tool-card:hover {
      border-color: var(--text-muted);
      box-shadow: 0 4px 20px rgba(0,0,0,0.06);
      transform: translateY(-2px);
    }

    .tool-card.disabled {
      opacity: 0.7;
      cursor: default;
    }

    .tool-card.disabled:hover {
      border-color: var(--border);
      box-shadow: none;
      transform: none;
    }

    .tool-icon {
      width: 44px;
      height: 44px;
      border-radius: 10px;
      display: flex;
      align-items: center;
      justify-content: center;
    }

    .tool-icon svg {
      width: 22px;
      height: 22px;
      stroke: white;
      fill: none;
      stroke-width: 1.8;
      stroke-linecap: round;
      stroke-linejoin: round;
    }

    .tool-name {
      font-family: 'DM Sans', sans-serif;
      font-size: 0.72rem;
      font-weight: 500;
      letter-spacing: 0.1em;
      text-transform: uppercase;
    }

    .tool-label {
      font-family: 'Instrument Serif', serif;
      font-size: 1.2rem;
      font-weight: 400;
      line-height: 1.3;
    }

    .badge-soon {
      position: absolute;
      top: 1rem;
      right: 1rem;
      font-size: 0.62rem;
      font-weight: 500;
      letter-spacing: 0.08em;
      text-transform: uppercase;
      background: var(--bg);
      color: var(--text-muted);
      border: 1px solid var(--border);
      border-radius: 20px;
      padding: 3px 10px;
    }

    /* ── RESPONSIVE ── */
    @media (max-width: 700px) {
      .tools-grid {
        grid-template-columns: 1fr;
      }

      .tool-card {
        min-height: auto;
        padding: 1.5rem;
      }

      .dashboard-title {
        font-size: 1.5rem;
      }
    }

    /* ── FOOTER ── */
    footer {
      padding: 1.5rem 2rem;
      text-align: center;
      font-size: 0.68rem;
      color: var(--text-light);
      letter-spacing: 0.04em;
    }

    /* ── LOADING ── */
    .loading {
      display: flex;
      flex-direction: column;
      align-items: center;
      gap: 1rem;
      padding: 4rem;
    }

    .spinner {
      width: 32px; height: 32px;
      border: 2px solid var(--border);
      border-top-color: var(--sylve);
      border-radius: 50%;
      animation: spin 0.7s linear infinite;
    }

    @keyframes spin { to { transform: rotate(360deg); } }

    .loading-text {
      font-size: 0.78rem;
      color: var(--text-muted);
    }
  </style>
</head>
<body>

  <header>
    <a href="/" class="logo">sylve</a>
    <div class="header-right">
      <span class="user-name" id="user-name"></span>
      <button class="btn-logout" onclick="logout()">Deconnexion</button>
    </div>
  </header>

  <main>
    <div class="dashboard-container" id="dashboard" style="display:none;">
      <div class="dashboard-eyebrow">Vos outils</div>
      <h1 class="dashboard-title" id="dashboard-title">Bonjour</h1>

      <div class="tools-grid">

        <!-- SYLVE Projet -->
        <a href="/projet" class="tool-card">
          <div class="tool-icon" style="background: #8A8279;">
            <svg viewBox="0 0 24 24">
              <path d="M12 2L2 7l10 5 10-5-10-5z"/>
              <path d="M2 17l10 5 10-5"/>
              <path d="M2 12l10 5 10-5"/>
            </svg>
          </div>
          <div class="tool-name" style="color: #8A8279;">SYLVE Projet</div>
          <div class="tool-label">Estimez vos projets paysagers</div>
        </a>

        <!-- SYLVE Pilote -->
        <div class="tool-card disabled">
          <span class="badge-soon">bientot</span>
          <div class="tool-icon" style="background: #A67C5B;">
            <svg viewBox="0 0 24 24">
              <path d="M12 20V10"/>
              <path d="M18 20V4"/>
              <path d="M6 20v-4"/>
            </svg>
          </div>
          <div class="tool-name" style="color: #A67C5B;">SYLVE Pilote</div>
          <div class="tool-label">Pilotez vos chantiers en temps reel</div>
        </div>

        <!-- SYLVE Source -->
        <div class="tool-card disabled">
          <span class="badge-soon">bientot</span>
          <div class="tool-icon" style="background: #C4973B;">
            <svg viewBox="0 0 24 24">
              <path d="M4 19.5A2.5 2.5 0 0 1 6.5 17H20"/>
              <path d="M6.5 2H20v20H6.5A2.5 2.5 0 0 1 4 19.5v-15A2.5 2.5 0 0 1 6.5 2z"/>
            </svg>
          </div>
          <div class="tool-name" style="color: #C4973B;">SYLVE Source</div>
          <div class="tool-label">Accedez aux references reglementaires</div>
        </div>

      </div>
    </div>

    <div class="loading" id="loading">
      <div class="spinner"></div>
      <div class="loading-text">Connexion en cours…</div>
    </div>
  </main>

  <footer>sylve.eco — outils numeriques pour les professionnels du paysage</footer>

  <script>
  const SUPABASE_URL  = 'https://jbqgyfbjyulezaclvmwc.supabase.co';
  const SUPABASE_ANON = 'eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6ImpicWd5ZmJqeXVsZXphY2x2bXdjIiwicm9sZSI6ImFub24iLCJpYXQiOjE3NzMxMzQyMDIsImV4cCI6MjA4ODcxMDIwMn0.dNibq1JOBz3UnqdLwENmS113TGKpw_UGWKR0cE8LgMI';

  const { createClient } = supabase;
  const sb = createClient(SUPABASE_URL, SUPABASE_ANON);

  async function init() {
    // Écouter les changements de session (retour depuis magic link)
    sb.auth.onAuthStateChange(async (event, session) => {
      if (session) {
        await loadDashboard(session);
      }
    });

    // Timeout 5s : si Supabase ne répond pas, rediriger vers login
    const timeout = setTimeout(() => {
      window.location.href = '/login';
    }, 5000);

    try {
      const { data: { session } } = await sb.auth.getSession();
      clearTimeout(timeout);

      if (!session) {
        window.location.href = '/login';
        return;
      }

      await loadDashboard(session);
    } catch (e) {
      clearTimeout(timeout);
      window.location.href = '/login';
    }
  }

  async function loadDashboard(session) {
    const { data: profile } = await sb.from('profiles')
      .select('prenom')
      .eq('id', session.user.id)
      .single();

    const prenom = profile?.prenom || '';
    document.getElementById('user-name').textContent = prenom;
    document.getElementById('dashboard-title').textContent = prenom
      ? 'Bonjour, ' + prenom
      : 'Vos outils';

    document.getElementById('loading').style.display = 'none';
    document.getElementById('dashboard').style.display = 'block';
  }

  async function logout() {
    await sb.auth.signOut();
    window.location.href = '/login';
  }

  init();
  </script>

</body>
</html>
